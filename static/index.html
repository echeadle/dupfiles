<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duplicate File Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; max-width: 1100px; margin: 0 auto; }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }

    .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .row { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    input[type=text] { flex: 1; min-width: 200px; padding: .6rem .8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { padding: .6rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-size: .9rem; white-space: nowrap; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .btn-blue   { background: #2563eb; color: white; }
    .btn-red    { background: #dc2626; color: white; }
    .btn-gray   { background: #6b7280; color: white; }
    .btn-outline { background: white; color: #374151; border: 1px solid #d1d5db; }
    .btn-sm     { padding: .3rem .7rem; font-size: .8rem; }

    #status { margin-top: .75rem; font-size: .9rem; color: #555; min-height: 1.4rem; }
    #status.error { color: #dc2626; }
    .progress-bar-wrap { background: #e5e7eb; border-radius: 4px; height: 8px; margin-top: .5rem; display: none; }
    .progress-bar { background: #2563eb; height: 8px; border-radius: 4px; width: 0%; transition: width .3s; }

    /* Config panel */
    details summary { cursor: pointer; font-weight: 600; font-size: .95rem; color: #374151; user-select: none; }
    details summary::-webkit-details-marker { color: #9ca3af; }
    .config-body { margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .config-group label { display: block; font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin-bottom: .4rem; }
    .tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .5rem; }
    .tag { display: inline-flex; align-items: center; gap: .3rem; background: #eff6ff; color: #1d4ed8; border-radius: 4px; padding: .2rem .5rem; font-size: .8rem; }
    .tag-remove { background: none; border: none; cursor: pointer; color: #93c5fd; padding: 0; font-size: .85rem; line-height: 1; }
    .tag-remove:hover { color: #1d4ed8; }
    .add-row { display: flex; gap: .5rem; }
    .add-row input { flex: 1; padding: .4rem .6rem; font-size: .85rem; }
    .add-row button { padding: .4rem .8rem; font-size: .85rem; }

    /* Delete bar */
    #deleteBar { display: none; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: .75rem 1rem; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 6px; }
    #deleteBar span { font-size: .9rem; color: #92400e; }

    /* Results table */
    #summary { font-size: .9rem; color: #555; margin-bottom: .75rem; }
    #noResults { display: none; color: #555; padding: .5rem 0; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { background: #f9fafb; text-align: left; padding: .5rem .75rem; border-bottom: 2px solid #e5e7eb; }
    td { padding: .45rem .75rem; border-bottom: 1px solid #f0f0f0; word-break: break-all; vertical-align: middle; }
    tr:hover td { background: #fafafa; }

    .group-header td { background: #eff6ff; padding: .6rem .75rem; }
    .group-meta { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .group-hash { font-weight: 600; color: #1d4ed8; font-size: .85rem; }
    .badge { display: inline-block; padding: .2rem .5rem; border-radius: 4px; font-size: .75rem; background: #fee2e2; color: #b91c1c; }

    input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563eb; }
    .cb-col { width: 36px; text-align: center; }

    /* Stats panel */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 640px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-tile { background: #f9fafb; border-radius: 6px; padding: .85rem 1rem; }
    .stat-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin-bottom: .25rem; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #111; }
    .stat-value.warn { color: #dc2626; }
    .stat-sub { font-size: .75rem; color: #9ca3af; margin-top: .15rem; }

    /* Browser modal */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: white; border-radius: 10px; width: 560px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 1rem; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #6b7280; padding: 0; line-height: 1; }
    .modal-close:hover { color: #111; }
    .modal-path { padding: .6rem 1.25rem; background: #f9fafb; border-bottom: 1px solid #e5e7eb; font-size: .82rem; color: #374151; font-family: monospace; word-break: break-all; }
    .modal-body { overflow-y: auto; flex: 1; }
    .dir-item { display: flex; align-items: center; gap: .6rem; padding: .55rem 1.25rem; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: .9rem; }
    .dir-item:hover { background: #eff6ff; }
    .dir-icon { color: #f59e0b; font-size: 1rem; flex-shrink: 0; }
    .dir-name { flex: 1; }
    .dir-arrow { color: #9ca3af; font-size: .8rem; }
    .dir-up { color: #6b7280; }
    .modal-footer { padding: .75rem 1.25rem; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: .5rem; }
  </style>
</head>
<body>
  <h1>Duplicate File Finder</h1>

  <!-- Scan card -->
  <div class="card">
    <div class="row">
      <input type="text" id="dirInput" placeholder="Enter or browse to a directory" />
      <button class="btn-outline" onclick="openBrowser()">Browse…</button>
      <button class="btn-blue" id="scanBtn" onclick="startScan()">Scan</button>
      <button class="btn-gray" onclick="clearResults()">Clear</button>
      <button class="btn-outline" onclick="clearCache()" title="Remove all cached file hashes from the database">Clear Cache</button>
    </div>
    <div id="status"></div>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Stats card -->
  <div class="card" id="statsCard">
    <div class="stats-grid">
      <div class="stat-tile">
        <div class="stat-label">Files in cache</div>
        <div class="stat-value" id="statFiles">—</div>
        <div class="stat-sub" id="statSize"></div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Duplicate groups</div>
        <div class="stat-value" id="statGroups">—</div>
        <div class="stat-sub" id="statDupFiles"></div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Recoverable space</div>
        <div class="stat-value warn" id="statWasted">—</div>
        <div class="stat-sub">across all duplicates</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Cache DB size</div>
        <div class="stat-value" id="statDb">—</div>
        <div class="stat-sub">files.db</div>
      </div>
    </div>
  </div>

  <!-- Config card -->
  <div class="card">
    <details>
      <summary>Configuration</summary>
      <div class="config-body">
        <div class="config-group">
          <label>Excluded Directories</label>
          <div class="tags" id="dirTags"></div>
          <div class="add-row">
            <input type="text" id="newDir" placeholder="e.g. .cache" onkeydown="if(event.key==='Enter') addDir()" />
            <button class="btn-outline btn-sm" onclick="addDir()">+ Add</button>
          </div>
        </div>
        <div class="config-group">
          <label>Excluded File Patterns</label>
          <div class="tags" id="patternTags"></div>
          <div class="add-row">
            <input type="text" id="newPattern" placeholder="e.g. *.log" onkeydown="if(event.key==='Enter') addPattern()" />
            <button class="btn-outline btn-sm" onclick="addPattern()">+ Add</button>
          </div>
        </div>
      </div>
    </details>
  </div>

  <!-- Results card -->
  <div class="card" id="resultsCard" style="display:none">
    <div id="summary"></div>

    <!-- Size filter -->
    <div id="filterBar" style="display:none; margin-bottom:.75rem;">
      <div class="row" style="gap:.5rem; align-items:center;">
        <label style="font-size:.85rem; color:#6b7280; white-space:nowrap;">Show files ≥</label>
        <input type="number" id="minSizeInput" min="0" value="0"
               style="width:90px; flex:none;"
               oninput="applyFilter()" />
        <select id="sizeUnit" onchange="applyFilter()"
                style="padding:.5rem .6rem; border:1px solid #ccc; border-radius:6px; font-size:.9rem; background:white;">
          <option value="1">bytes</option>
          <option value="1024">KB</option>
          <option value="1048576" selected>MB</option>
          <option value="1073741824">GB</option>
        </select>
        <button class="btn-outline btn-sm" onclick="resetFilter()">Reset</button>
      </div>
    </div>

    <div id="deleteBar">
      <span id="deleteCount"></span>
      <button class="btn-red btn-sm" onclick="deleteSelected()">Move to Trash</button>
    </div>

    <p id="noResults">No duplicate files found.</p>
    <table id="resultsTable" style="display:none">
      <thead>
        <tr>
          <th class="cb-col"></th>
          <th>Path</th>
          <th>Size</th>
          <th>Modified</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
    <div id="loadMoreWrap" style="display:none; text-align:center; padding:1rem 0;">
      <button class="btn-outline" id="loadMoreBtn" onclick="loadMore()"></button>
      <div id="pageInfo" style="font-size:.8rem; color:#9ca3af; margin-top:.4rem;"></div>
    </div>
  </div>

  <!-- Browser modal -->
  <div class="modal-backdrop" id="browserModal" onclick="handleBackdropClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Browse for Directory</h2>
        <button class="modal-close" onclick="closeBrowser()">×</button>
      </div>
      <div class="modal-path" id="browserPath">/</div>
      <div class="modal-body" id="browserBody"></div>
      <div class="modal-footer">
        <button class="btn-outline btn-sm" onclick="closeBrowser()">Cancel</button>
        <button class="btn-blue btn-sm" onclick="selectCurrentDir()">Select This Folder</button>
      </div>
    </div>
  </div>

  <script>
    let pollTimer = null;
    let currentConfig = { exclude_dirs: [], exclude_patterns: [] };
    let browserCurrentPath = '';
    let currentOffset  = 0;
    let currentMinSize = 0;
    let totalGroups    = 0;
    let renderedCount  = 0;
    let filterTimer    = null;
    const PAGE_SIZE    = 50;

    // ---- Formatting helpers ----

    function fmtSize(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(2) + ' GB';
      if (bytes >= 1048576)    return (bytes / 1048576).toFixed(2) + ' MB';
      if (bytes >= 1024)       return (bytes / 1024).toFixed(1) + ' KB';
      return bytes + ' B';
    }

    function fmtDate(ts) {
      return new Date(ts * 1000).toLocaleString();
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    // ---- File browser ----

    async function openBrowser() {
      const startPath = document.getElementById('dirInput').value.trim() || '~';
      document.getElementById('browserModal').classList.add('open');
      await navigateTo(startPath);
    }

    function closeBrowser() {
      document.getElementById('browserModal').classList.remove('open');
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('browserModal')) closeBrowser();
    }

    function selectCurrentDir() {
      document.getElementById('dirInput').value = browserCurrentPath;
      closeBrowser();
    }

    async function navigateTo(path) {
      const r = await fetch(`/browse?path=${encodeURIComponent(path)}`);
      const data = await r.json();

      if (data.error) {
        document.getElementById('browserBody').innerHTML =
          `<div class="dir-item" style="color:#dc2626">${data.error}</div>`;
        return;
      }

      browserCurrentPath = data.path;
      document.getElementById('browserPath').textContent = data.path;

      const body = document.getElementById('browserBody');
      body.innerHTML = '';

      if (data.parent) {
        const up = document.createElement('div');
        up.className = 'dir-item dir-up';
        up.innerHTML = `<span class="dir-icon">↑</span><span class="dir-name">.. (parent)</span>`;
        up.onclick = () => navigateTo(data.parent);
        body.appendChild(up);
      }

      if (data.entries.length === 0) {
        body.innerHTML += `<div class="dir-item" style="color:#6b7280; font-style:italic">No subdirectories</div>`;
        return;
      }

      for (const entry of data.entries) {
        const item = document.createElement('div');
        item.className = 'dir-item';
        item.innerHTML = `
          <span class="dir-icon">📁</span>
          <span class="dir-name">${entry.name}</span>
          <span class="dir-arrow">›</span>
        `;
        item.onclick = () => navigateTo(entry.path);
        body.appendChild(item);
      }
    }

    // ---- Config ----

    async function loadConfig() {
      const r = await fetch('/config');
      currentConfig = await r.json();
      if (currentConfig.last_path) {
        document.getElementById('dirInput').value = currentConfig.last_path;
      }
      renderConfig();
    }

    function renderConfig() {
      renderTags('dirTags',     currentConfig.exclude_dirs,     removeDir);
      renderTags('patternTags', currentConfig.exclude_patterns, removePattern);
    }

    function renderTags(containerId, items, removeFn) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      for (const item of items) {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.innerHTML = `${item} <button class="tag-remove" title="Remove">×</button>`;
        tag.querySelector('button').onclick = () => removeFn(item);
        el.appendChild(tag);
      }
    }

    async function saveConfig() {
      await fetch('/config', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentConfig),
      });
      renderConfig();
    }

    async function addDir() {
      const val = document.getElementById('newDir').value.trim();
      if (!val || currentConfig.exclude_dirs.includes(val)) return;
      currentConfig.exclude_dirs.push(val);
      document.getElementById('newDir').value = '';
      await saveConfig();
    }

    async function removeDir(dir) {
      currentConfig.exclude_dirs = currentConfig.exclude_dirs.filter(d => d !== dir);
      await saveConfig();
    }

    async function addPattern() {
      const val = document.getElementById('newPattern').value.trim();
      if (!val || currentConfig.exclude_patterns.includes(val)) return;
      currentConfig.exclude_patterns.push(val);
      document.getElementById('newPattern').value = '';
      await saveConfig();
    }

    async function removePattern(p) {
      currentConfig.exclude_patterns = currentConfig.exclude_patterns.filter(x => x !== p);
      await saveConfig();
    }

    // ---- Scan ----

    async function startScan() {
      const dir = document.getElementById('dirInput').value.trim();
      if (!dir) { setStatus('Please enter a directory path.', true); return; }

      document.getElementById('scanBtn').disabled = true;
      document.getElementById('resultsCard').style.display = 'none';
      document.getElementById('progressWrap').style.display = 'block';
      document.getElementById('progressBar').style.width = '0%';
      setStatus('Starting scan…');

      const res = await fetch('/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: dir }),
      });
      const data = await res.json();

      if (data.status === 'error') {
        setStatus(data.message, true);
        document.getElementById('scanBtn').disabled = false;
        document.getElementById('progressWrap').style.display = 'none';
        return;
      }

      if (data.purged > 0) {
        setStatus(`Purged ${data.purged} excluded file(s) from cache. Scanning…`);
      }

      pollTimer = setInterval(pollStatus, 1500);
    }

    async function pollStatus() {
      const s = await (await fetch('/scan/status')).json();
      setStatus(`Scanning… ${s.processed || 0} hashed, ${s.skipped || 0} cached`);
      if (s.done) {
        clearInterval(pollTimer);
        document.getElementById('progressBar').style.width = '100%';
        setStatus(`Done — ${s.processed} files hashed, ${s.skipped} from cache` +
          (s.errors?.length ? ` (${s.errors.length} errors)` : ''));
        document.getElementById('scanBtn').disabled = false;
        await showDuplicates();
        await loadStats();
      }
    }

    // ---- Results ----

    async function showDuplicates() {
      currentOffset  = 0;
      renderedCount  = 0;
      totalGroups    = 0;
      document.getElementById('resultsBody').innerHTML = '';
      document.getElementById('loadMoreWrap').style.display = 'none';
      document.getElementById('resultsCard').style.display = 'block';
      await fetchPage();
    }

    async function fetchPage() {
      const url  = `/duplicates?limit=${PAGE_SIZE}&offset=${currentOffset}&min_size=${currentMinSize}`;
      const data = await (await fetch(url)).json();
      totalGroups    = data.total_groups;
      currentOffset += data.returned_groups;

      document.getElementById('filterBar').style.display = 'block';

      if (data.total_groups === 0) {
        document.getElementById('noResults').style.display = 'block';
        document.getElementById('noResults').textContent =
          currentMinSize > 0 ? 'No duplicates match the current filter.' : 'No duplicate files found.';
        document.getElementById('resultsTable').style.display = 'none';
        document.getElementById('summary').textContent = '';
        document.getElementById('loadMoreWrap').style.display = 'none';
        return;
      }

      document.getElementById('noResults').style.display = 'none';
      document.getElementById('resultsTable').style.display = 'table';
      appendGroups(data.duplicate_groups);
      renderedCount += data.returned_groups;
      updateSummary();
      updateLoadMore();
    }

    function appendGroups(groups) {
      const tbody = document.getElementById('resultsBody');
      for (const group of groups) {
        const hdr = document.createElement('tr');
        hdr.className = 'group-header';
        hdr.innerHTML = `<td></td><td colspan="3">
          <div class="group-meta">
            <span class="group-hash">Hash: ${group.hash.substring(0, 16)}…</span>
            <span class="badge">${group.count} copies · ${fmtSize(group.files[0]?.size || 0)} each</span>
            <button class="btn-outline btn-sm" onclick="keepNewest('${group.hash}')">Keep newest</button>
            <button class="btn-outline btn-sm" onclick="keepShortest('${group.hash}')">Keep shortest path</button>
          </div>
        </td>`;
        tbody.appendChild(hdr);

        for (const file of group.files) {
          const row = document.createElement('tr');
          row.dataset.group = group.hash;
          row.dataset.path  = file.path;
          row.dataset.mtime = file.mtime;
          row.innerHTML = `
            <td class="cb-col"><input type="checkbox" onchange="updateDeleteBar()" /></td>
            <td>${file.path}</td>
            <td>${fmtSize(file.size)}</td>
            <td>${fmtDate(file.mtime)}</td>
          `;
          tbody.appendChild(row);
        }
      }
    }

    async function loadMore() {
      await fetchPage();
    }

    function updateSummary() {
      document.getElementById('summary').textContent =
        `Showing ${renderedCount.toLocaleString()} of ${totalGroups.toLocaleString()} group(s)`;
    }

    function updateLoadMore() {
      const remaining = totalGroups - renderedCount;
      const wrap = document.getElementById('loadMoreWrap');
      if (remaining > 0) {
        wrap.style.display = 'block';
        document.getElementById('loadMoreBtn').textContent =
          `Load next ${Math.min(remaining, PAGE_SIZE)} groups`;
        document.getElementById('pageInfo').textContent =
          `${remaining.toLocaleString()} group(s) remaining`;
      } else {
        wrap.style.display = 'none';
      }
    }

    function applyFilter() {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(async () => {
        const value    = parseFloat(document.getElementById('minSizeInput').value) || 0;
        const unit     = parseInt(document.getElementById('sizeUnit').value);
        currentMinSize = Math.round(value * unit);
        currentOffset  = 0;
        renderedCount  = 0;
        document.getElementById('resultsBody').innerHTML = '';
        await fetchPage();
      }, 400);
    }

    async function resetFilter() {
      document.getElementById('minSizeInput').value = '0';
      currentMinSize = 0;
      currentOffset  = 0;
      renderedCount  = 0;
      document.getElementById('resultsBody').innerHTML = '';
      await fetchPage();
    }

    // ---- Selection helpers ----

    function rowsForGroup(hash) {
      return [...document.querySelectorAll(`tr[data-group="${hash}"]`)];
    }

    function keepNewest(hash) {
      const rows = rowsForGroup(hash);
      const newest = rows.reduce((a, b) => parseFloat(a.dataset.mtime) > parseFloat(b.dataset.mtime) ? a : b);
      rows.forEach(r => r.querySelector('input').checked = r !== newest);
      updateDeleteBar();
    }

    function keepShortest(hash) {
      const rows = rowsForGroup(hash);
      const shortest = rows.reduce((a, b) => a.dataset.path.length <= b.dataset.path.length ? a : b);
      rows.forEach(r => r.querySelector('input').checked = r !== shortest);
      updateDeleteBar();
    }

    function updateDeleteBar() {
      const checked = [...document.querySelectorAll('#resultsBody input[type=checkbox]:checked')];
      const bar = document.getElementById('deleteBar');
      if (checked.length === 0) {
        bar.style.display = 'none';
      } else {
        bar.style.display = 'flex';
        document.getElementById('deleteCount').textContent = `${checked.length} file${checked.length > 1 ? 's' : ''} selected`;
      }
    }

    // ---- Delete ----

    async function deleteSelected() {
      const checked = [...document.querySelectorAll('#resultsBody input[type=checkbox]:checked')];
      const paths = checked.map(cb => cb.closest('tr').dataset.path);
      if (paths.length === 0) return;

      const msg = `Move ${paths.length} file${paths.length > 1 ? 's' : ''} to trash?\n\n` + paths.join('\n');
      if (!confirm(msg)) return;

      const res = await fetch('/files/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paths }),
      });
      const data = await res.json();

      const trashed = data.trashed?.length || 0;
      const failed  = data.failed?.length  || 0;
      let msg2 = `${trashed} file${trashed !== 1 ? 's' : ''} moved to trash.`;
      if (failed > 0) msg2 += ` ${failed} failed.`;
      setStatus(msg2);

      await showDuplicates();
      await loadStats();
    }

    // ---- Clear cache ----

    async function clearCache() {
      if (!confirm('Remove all cached file hashes from the database? The next scan will re-hash everything.')) return;
      const r = await fetch('/cache/clear', { method: 'POST' });
      const data = await r.json();
      setStatus(`Cache cleared — ${data.cleared} record(s) removed.`);
    }

    // ---- Clear results ----

    function clearResults() {
      document.getElementById('resultsCard').style.display = 'none';
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('progressBar').style.width = '0%';
      setStatus('');
    }

    // ---- Stats ----

    async function loadStats() {
      const s = await (await fetch('/stats')).json();
      document.getElementById('statFiles').textContent  = s.total_files.toLocaleString();
      document.getElementById('statSize').textContent   = fmtSize(s.total_size);
      document.getElementById('statGroups').textContent = s.duplicate_groups.toLocaleString();
      document.getElementById('statDupFiles').textContent =
        s.duplicate_files > 0 ? `${s.duplicate_files} files involved` : 'none found';
      document.getElementById('statWasted').textContent = s.wasted_space > 0 ? fmtSize(s.wasted_space) : '0 B';
      document.getElementById('statDb').textContent     = fmtSize(s.db_size);
    }

    // ---- Init ----
    loadConfig();
    loadStats();
    showDuplicates();
  </script>
</body>
</html>
